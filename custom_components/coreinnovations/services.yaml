  fields:
    device_id:
      name: Printer
      required: false
      selector:
        device:
          integration: coreinnovations
          multiple: true
    preview:
      name: Preview only
      required: false
      default: false
      selector:
        boolean:
    feed:
      name: Feed after print
      required: false
      selector:
        number: { min: 0, max: 2000, step: 1, unit_of_measurement: pixels }
    energy:
      name: Darkness
      description: Burn energy 0-65535 (overrides the configured default; higher = darker).
      required: false
      selector:
        number: { min: 0, max: 65535, step: 256 }
    speed:
      name: Speed
