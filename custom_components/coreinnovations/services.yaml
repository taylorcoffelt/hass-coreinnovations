print_document:
  name: Print document
  description: >-
    Compose a whole receipt (header, rules, checkboxes, tables, mixed font
    sizes, QR/barcodes, images) into a single image and print it in one job —
    no per-line feed gaps or reconnects.
  fields:
    device_id:
      name: Printer
      required: false
      selector:
        device:
          integration: coreinnovations
          multiple: true
    preview:
      name: Preview only
      required: false
      default: false
      selector:
        boolean:
    feed:
      name: Feed after print
      required: false
      selector:
        number: { min: 0, max: 2000, step: 1, unit_of_measurement: pixels }
    energy:
      name: Darkness
      description: Burn energy 0-65535 (overrides the configured default; higher = darker).
      required: false
      selector:
        number: { min: 0, max: 65535, step: 256 }
    speed:
      name: Speed
      description: Lower is faster; below ~4 may stall the feed.
      required: false
      selector:
        number: { min: 1, max: 255, step: 1 }
    font:
      name: Default font
      description: "Default font for text blocks (alias, filename, or absolute path). Each block may override it."
      required: false
      default: ubuntu
      selector:
        text:
    gap:
      name: Gap between blocks
      description: Blank pixels inserted between blocks.
      required: false
      default: 0
      selector:
        number: { min: 0, max: 200, step: 1, unit_of_measurement: px }
    blocks:
      name: Blocks
      description: >-
        Ordered list of blocks. Each is a mapping with a "type" and its fields.
        Types: header, text, rule, checkbox, table, kvtable, box, qr, barcode,
        image, space. Text supports glyph fallback and :mdi-icon-name: tokens.
      required: true
      example: |
        - { type: header, text: "DAILY STANDUP" }
        - { type: rule, style: double }
        - { type: text, text: "Crew: 3  Weather: :weather-sunny:", size: 24 }
        - { type: checkbox, text: "Restock paper", checked: true }
        - { type: checkbox, text: "Email the report", checked: false }
        - { type: rule }
        - { type: kvtable, rows: { Total: "$12.96" }, size: 22 }
        - { type: qr, data: "https://home-assistant.io", scale: 4 }
      selector:
        object:

print_test:
  name: Print test strip
  description: Print a 0-100% density gradient (stamped with the energy value) to tune darkness and verify the protocol over your proxy.
  fields:
    device_id:
      name: Printer
      required: false
      selector:
        device:
          integration: coreinnovations
          multiple: true
    preview:
      name: Preview only
      required: false
      default: false
      selector:
        boolean:
    feed:
      name: Feed after print
      required: false
      selector:
        number: { min: 0, max: 2000, step: 1, unit_of_measurement: pixels }
    energy:
      name: Darkness
      description: Burn energy 0-65535 (overrides the configured default; higher = darker).
      required: false
      selector:
        number: { min: 0, max: 65535, step: 256 }
    speed:
      name: Speed
      description: Lower is faster; below ~4 may stall the feed.
      required: false
      selector:
        number: { min: 1, max: 255, step: 1 }
    problem_feeding:
      name: Feed by drawing blank rows
      description: ON = feed via blank rows inside the lattice (reliable). OFF = use the feed_paper command (fast).
      required: false
      selector:
        boolean:
    packet_delay:
      name: Delay between BLE writes (ms)
      description: Override the configured pacing for this print.
      required: false
      selector:
        number: { min: 0, max: 1000, step: 1, unit_of_measurement: milliseconds }
    chunk_size:
      name: BLE write chunk size (bytes)
      description: Override the configured chunk size for this print.
      required: false
      selector:
        number: { min: 20, max: 512, step: 1, unit_of_measurement: bytes }

feed:
  name: Feed paper
  description: Advance the paper without printing.
  fields:
    device_id:
      name: Printer
      description: Target printer(s). If omitted, broadcasts to every configured CTP500.
      required: false
      selector:
        device:
          integration: coreinnovations
          multiple: true
    pixels:
      name: Pixels
      description: Number of pixels to advance.
      required: false
      default: 80
      selector:
        number: { min: 1, max: 1000, step: 1, unit_of_measurement: pixels }
